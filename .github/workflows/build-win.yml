name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Version for package name (example: 1.0.1)"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "v*"

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve App Version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $v = "${{ inputs.app_version }}"
          }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ZIP_NAME=TakealotAutoLister-win-$v.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "APP_VERSION=$v"

      - name: Prepare bundled OSS env
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BASE_URL: ${{ secrets.OSS_BASE_URL }}
          OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
        run: |
          $lines = New-Object System.Collections.Generic.List[string]
          if ($env:OSS_ACCESS_KEY_ID) { [void]$lines.Add("OSS_ACCESS_KEY_ID=$($env:OSS_ACCESS_KEY_ID)") }
          if ($env:OSS_ACCESS_KEY_SECRET) { [void]$lines.Add("OSS_ACCESS_KEY_SECRET=$($env:OSS_ACCESS_KEY_SECRET)") }
          if ($env:OSS_BUCKET) { [void]$lines.Add("OSS_BUCKET=$($env:OSS_BUCKET)") }
          if ($env:OSS_ENDPOINT) { [void]$lines.Add("OSS_ENDPOINT=$($env:OSS_ENDPOINT)") }
          if ($env:OSS_BASE_URL) { [void]$lines.Add("OSS_BASE_URL=$($env:OSS_BASE_URL)") }
          if ($env:OSS_PREFIX) { [void]$lines.Add("OSS_PREFIX=$($env:OSS_PREFIX)") }

          if ($lines.Count -gt 0) {
            Set-Content -Path ".env" -Value $lines -Encoding UTF8
            Write-Host "Prepared OSS-only .env for packaging."
          } else {
            Write-Warning "No OSS_* GitHub Secrets found. Windows package will not contain OSS config."
          }

      - name: Build Windows package
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path build_logs | Out-Null
          & .\scripts\build_win.ps1 -AppName "TakealotAutoLister" -AppVersion "${env:APP_VERSION}" *>&1 | Tee-Object -FilePath build_logs/build_win.log
          $exitCode = $LASTEXITCODE
          if ($null -eq $exitCode) { $exitCode = 0 }
          $zipPath = "dist/${env:ZIP_NAME}"
          if (!(Test-Path $zipPath)) {
            "zip not found: $zipPath" | Tee-Object -FilePath build_logs/build_win.log -Append
            $exitCode = 1
          }
          Write-Host "Build exit code: $exitCode"
          if ($exitCode -ne 0) {
            "BUILD_FAILED=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "BUILD_FAILED=0" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Upload artifact
        if: env.BUILD_FAILED == '0'
        uses: actions/upload-artifact@v4
        with:
          name: windows-package-${{ env.APP_VERSION }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log-${{ env.APP_VERSION }}
          path: build_logs/build_win.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v') && env.BUILD_FAILED == '0'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true

      - name: Fail workflow if build failed
        if: env.BUILD_FAILED == '1'
        shell: pwsh
        run: |
          Write-Error "Windows build failed. Please download artifact windows-build-log-${env:APP_VERSION} and check build_win.log."
