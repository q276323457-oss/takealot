name: Build Windows Package

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Version for package name (example: 1.0.1)"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "v*"

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve App Version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $v = "${{ inputs.app_version }}"
          }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ZIP_NAME=TakealotAutoLister-win-$v.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "APP_VERSION=$v"

      - name: Build Windows package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_win.ps1 -AppVersion "${env:APP_VERSION}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package-${{ env.APP_VERSION }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
