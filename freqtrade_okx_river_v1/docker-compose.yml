---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable_freqaitorch
    container_name: freqtrade-okx-river-v1
    restart: unless-stopped
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.base.json
      --config /freqtrade/user_data/config.private.json
      --strategy OKXRiverTrendStrategyV2
